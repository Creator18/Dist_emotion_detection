<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #6200ea;
            color: white;
            padding: 20px 10px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .result-box {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            background-color: #e8f5e9;
            color: #2e7d32;
            font-size: 1.2em;
            font-weight: bold;
            text-align: center;
        }
        .secondary-emotions {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            background-color: #fff8e1;
            color: #f57c00;
            font-size: 1em;
        }
        button {
            background-color: #6200ea;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            display: block;
            margin: 0 auto;
        }
        button:hover {
            background-color: #3700b3;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #f4f4f9;
            font-size: 0.9em;
            color: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>Emotion Detection Result</h1>
    </header>
    <div class="container">
        <div class="result-box">
            <p>Primary Emotion Detected: <strong>{{ primary_emotion }}</strong></p>
        </div>
        <div class="secondary-emotions">
            <h2>Secondary Emotions</h2>
            <table>
                <thead>
                    <tr>
                        <th>Emotion</th>
                        <th>Confidence (%)</th>
                    </tr>
                </thead>
                <tbody>
                    {% for emotion, confidence in secondary_emotions.items() %}
                    <tr>
                        <td>{{ emotion }}</td>
                        <td>{{ confidence }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        <button onclick="window.location.href='/'">Analyze Another Sentence</button>
    </div>
    <footer>
        &copy; 2024 Emotion Detection System | Powered by Flask
    </footer>
</body>
</html>
