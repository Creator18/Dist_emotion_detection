<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion Detection System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #6200ea;
            color: white;
            padding: 20px 10px;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 2.5em;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        label {
            font-size: 1.1em;
            color: #333;
        }
        textarea {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            font-size: 1em;
            border: 1px solid #ccc;
            border-radius: 5px;
            resize: none;
        }
        button {
            background-color: #6200ea;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #3700b3;
        }
        footer {
            text-align: center;
            padding: 20px;
            background-color: #f4f4f9;
            font-size: 0.9em;
            color: #555;
        }
    </style>
</head>
<body>
    <header>
        <h1>Emotion Detection System</h1>
    </header>
    <div class="container">
        <form action="/predict" method="post">
            <label for="sentence">Enter a Sentence:</label><br>
            <textarea id="sentence" name="sentence" rows="4" placeholder="Type your sentence here..."></textarea><br>
            <button type="submit">Predict Emotion</button>
        </form>
    </div>
    <footer>
        &copy; 2024 Emotion Detection System | Powered by Flask
    </footer>
</body>
</html>
